name: Deploy to GCP

# ┌─────────────────────────────────────────────────────────────────────┐
# │  最適化されたデプロイフロー (並列ビルド)                              │
# │                                                                     │
# │  changes                                                            │
# │    ├─ build-push-backend ──── deploy-backend ──── migrate-database  │
# │    │                                                       ↓        │
# │    └─ build-push-frontend ──────────────────────── deploy-frontend  │
# │                                                            ↓        │
# │                                              configure-backend-env  │
# │                                                                     │
# │  【高速化ポイント】                                                    │
# │  バックエンドとフロントエンドのDockerビルドを同時実行。                │
# │  キャッシュなし時: ~13分 → ~9分 (約4分短縮)                          │
# │  キャッシュあり時:  ~7分 → ~5分 (約2分短縮)                          │
# │                                                                     │
# │  【失敗時の安全設計】                                                 │
# │  build-push-backend 失敗  → deploy/migrate は実行しない              │
# │  deploy-backend 失敗      → migrate は実行しない (スキーマ不整合防止) │
# │  migrate-database 失敗    → deploy-frontend はブロック               │
# │  build-push-frontend 失敗 → deploy-frontend はスキップ              │
# └─────────────────────────────────────────────────────────────────────┘

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION || 'asia-northeast1' }}
  REPOSITORY: ${{ vars.AR_REPOSITORY || 'gdgoc-hackathon' }}
  REGISTRY_HOST: asia-northeast1-docker.pkg.dev
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 変更検出 ──────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/deploy.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/deploy.yml'

  # ── バックエンド: Dockerビルド + Artifact Registry プッシュ ───────────
  # フロントエンドビルドと並列実行される
  build-push-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      backend_image: ${{ steps.build-meta.outputs.backend_image }}

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.REGISTRY_HOST }}" --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - id: build-meta
        name: Set image tag
        run: |
          echo "backend_image=${{ env.REGISTRY_HOST }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.build-meta.outputs.backend_image }}
          cache-from: type=registry,ref=${{ env.REGISTRY_HOST }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:cache
          cache-to: type=registry,ref=${{ env.REGISTRY_HOST }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:cache,mode=max

  # ── フロントエンド: Dockerビルド + Artifact Registry プッシュ ─────────
  # バックエンドビルドと並列実行される（最大の高速化ポイント）
  # backend URL は既存 Cloud Run サービスから事前取得（URLは固定のため安全）
  build-push-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      frontend_image: ${{ steps.build-meta.outputs.frontend_image }}

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.REGISTRY_HOST }}" --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - id: build-meta
        name: Set image tag
        run: |
          echo "frontend_image=${{ env.REGISTRY_HOST }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Get backend URL
        id: backend-url
        run: |
          # Cloud Run URL は固定のためデプロイ前でも取得可能
          # 初回デプロイ時のみサービスが存在しないため vars.BACKEND_URL にフォールバック
          BACKEND_URL=$(gcloud run services describe backend \
            --region="${{ env.REGION }}" \
            --format='value(status.url)' 2>/dev/null || true)
          if [ -z "$BACKEND_URL" ]; then
            BACKEND_URL="${{ vars.BACKEND_URL }}"
          fi
          echo "url=${BACKEND_URL}" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.build-meta.outputs.frontend_image }}
          build-args: NEXT_PUBLIC_API_BASE=${{ steps.backend-url.outputs.url }}
          cache-from: type=registry,ref=${{ env.REGISTRY_HOST }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:cache
          cache-to: type=registry,ref=${{ env.REGISTRY_HOST }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:cache,mode=max

  # ── バックエンド: Cloud Run デプロイ ──────────────────────────────────
  # ビルド成功後に実行（ソースコードのcheckout不要）
  deploy-backend:
    needs: build-push-backend
    if: needs.build-push-backend.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Create backend env file
        run: |
          cat > backend-env.yaml << 'ENVEOF'
          DEBUG: "False"
          ALLOWED_HOSTS: ".run.app,localhost,127.0.0.1"
          DB_SOCKET_DIR: "/cloudsql"
          EMAIL_BACKEND: "django.core.mail.backends.smtp.EmailBackend"
          EMAIL_PORT: "587"
          EMAIL_USE_TLS: "True"
          ENVEOF
          echo "SECRET_KEY: \"${{ secrets.DJANGO_SECRET_KEY }}\"" >> backend-env.yaml
          echo "DB_NAME: \"${{ secrets.DB_NAME }}\"" >> backend-env.yaml
          echo "DB_USER: \"${{ secrets.DB_USER }}\"" >> backend-env.yaml
          echo "DB_PASSWORD: \"${{ secrets.DB_PASSWORD }}\"" >> backend-env.yaml
          echo "CLOUD_SQL_INSTANCE: \"${{ vars.CLOUD_SQL_INSTANCE }}\"" >> backend-env.yaml
          echo "GOOGLE_CLIENT_ID: \"${{ secrets.GOOGLE_CLIENT_ID }}\"" >> backend-env.yaml
          echo "EMAIL_HOST: \"${{ secrets.EMAIL_HOST }}\"" >> backend-env.yaml
          echo "EMAIL_HOST_USER: \"${{ secrets.EMAIL_HOST_USER }}\"" >> backend-env.yaml
          echo "EMAIL_HOST_PASSWORD: \"${{ secrets.EMAIL_HOST_PASSWORD }}\"" >> backend-env.yaml
          echo "DEFAULT_FROM_EMAIL: \"${{ secrets.DEFAULT_FROM_EMAIL }}\"" >> backend-env.yaml
          echo "FRONTEND_URL: \"${{ secrets.FRONTEND_URL }}\"" >> backend-env.yaml
          echo "CORS_ALLOWED_ORIGINS: \"${{ secrets.FRONTEND_URL }}\"" >> backend-env.yaml
          echo "CSRF_TRUSTED_ORIGINS: \"${{ secrets.FRONTEND_URL }}\"" >> backend-env.yaml
          echo "GCS_BUCKET_NAME: \"${{ vars.GCS_BUCKET_NAME }}\"" >> backend-env.yaml

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy backend \
            --image="${{ needs.build-push-backend.outputs.backend_image }}" \
            --region="${{ env.REGION }}" \
            --platform=managed \
            --allow-unauthenticated \
            --add-cloudsql-instances="${{ vars.CLOUD_SQL_INSTANCE }}" \
            --env-vars-file=backend-env.yaml \
            --quiet

  # ── DBマイグレーション ─────────────────────────────────────────────────
  # deploy-backend 成功後のみ実行
  # 【安全性】deploy-backend が失敗した場合はスキップ（スキーマ不整合防止）
  # deploy-frontend は migrate-database の成否を確認してから実行される
  migrate-database:
    needs: deploy-backend
    if: needs.deploy-backend.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Create backend env file
        run: |
          cat > backend-env.yaml << 'ENVEOF'
          DEBUG: "False"
          ALLOWED_HOSTS: ".run.app,localhost,127.0.0.1"
          DB_SOCKET_DIR: "/cloudsql"
          EMAIL_BACKEND: "django.core.mail.backends.smtp.EmailBackend"
          EMAIL_PORT: "587"
          EMAIL_USE_TLS: "True"
          ENVEOF
          echo "SECRET_KEY: \"${{ secrets.DJANGO_SECRET_KEY }}\"" >> backend-env.yaml
          echo "DB_NAME: \"${{ secrets.DB_NAME }}\"" >> backend-env.yaml
          echo "DB_USER: \"${{ secrets.DB_USER }}\"" >> backend-env.yaml
          echo "DB_PASSWORD: \"${{ secrets.DB_PASSWORD }}\"" >> backend-env.yaml
          echo "CLOUD_SQL_INSTANCE: \"${{ vars.CLOUD_SQL_INSTANCE }}\"" >> backend-env.yaml
          echo "GOOGLE_CLIENT_ID: \"${{ secrets.GOOGLE_CLIENT_ID }}\"" >> backend-env.yaml
          echo "EMAIL_HOST: \"${{ secrets.EMAIL_HOST }}\"" >> backend-env.yaml
          echo "EMAIL_HOST_USER: \"${{ secrets.EMAIL_HOST_USER }}\"" >> backend-env.yaml
          echo "EMAIL_HOST_PASSWORD: \"${{ secrets.EMAIL_HOST_PASSWORD }}\"" >> backend-env.yaml
          echo "DEFAULT_FROM_EMAIL: \"${{ secrets.DEFAULT_FROM_EMAIL }}\"" >> backend-env.yaml
          echo "FRONTEND_URL: \"${{ secrets.FRONTEND_URL }}\"" >> backend-env.yaml
          echo "GCS_BUCKET_NAME: \"${{ vars.GCS_BUCKET_NAME }}\"" >> backend-env.yaml

      - name: Create or update migration job
        run: |
          # イメージタグは GITHUB_SHA から再計算（依存関係の伝播が不要）
          BACKEND_IMAGE="${{ env.REGISTRY_HOST }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:${GITHUB_SHA}"
          if gcloud run jobs describe migrate --region="${{ env.REGION }}" --quiet >/dev/null 2>&1; then
            gcloud run jobs update migrate \
              --image="${BACKEND_IMAGE}" \
              --region="${{ env.REGION }}" \
              --set-cloudsql-instances="${{ vars.CLOUD_SQL_INSTANCE }}" \
              --env-vars-file=backend-env.yaml \
              --command=python \
              --args=manage.py,migrate,--noinput \
              --quiet
          else
            gcloud run jobs create migrate \
              --image="${BACKEND_IMAGE}" \
              --region="${{ env.REGION }}" \
              --set-cloudsql-instances="${{ vars.CLOUD_SQL_INSTANCE }}" \
              --env-vars-file=backend-env.yaml \
              --command=python \
              --args=manage.py,migrate,--noinput \
              --quiet
          fi

      - name: Execute migration job
        run: gcloud run jobs execute migrate --region="${{ env.REGION }}" --wait

  # ── フロントエンド: Cloud Run デプロイ ────────────────────────────────
  # build-push-frontend 成功 かつ migrate-database 成功/スキップ の両方を確認
  # 【安全性】migrate 失敗時はフロントエンドもデプロイしない（DB不整合防止）
  deploy-frontend:
    needs: [build-push-frontend, migrate-database]
    if: |
      always() &&
      needs.build-push-frontend.result == 'success' &&
      (needs.migrate-database.result == 'success' || needs.migrate-database.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      frontend_url: ${{ steps.frontend-url.outputs.url }}

    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy frontend \
            --image="${{ needs.build-push-frontend.outputs.frontend_image }}" \
            --region="${{ env.REGION }}" \
            --platform=managed \
            --allow-unauthenticated \
            --quiet

      - id: frontend-url
        name: Read frontend URL
        run: |
          FRONTEND_URL="$(gcloud run services describe frontend --region="${{ env.REGION }}" --format='value(status.url)')"
          echo "url=${FRONTEND_URL}" >> "$GITHUB_OUTPUT"

  # ── バックエンドのCORS設定を更新 ─────────────────────────────────────
  configure-backend-public-env:
    needs: deploy-frontend
    if: needs.deploy-frontend.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Update backend CORS for frontend URL
        run: |
          gcloud run services update backend \
            --region="${{ env.REGION }}" \
            --update-env-vars="^@^FRONTEND_URL=${{ needs.deploy-frontend.outputs.frontend_url }}@CORS_ALLOWED_ORIGINS=${{ needs.deploy-frontend.outputs.frontend_url }}@CSRF_TRUSTED_ORIGINS=${{ needs.deploy-frontend.outputs.frontend_url }}" \
            --quiet
